<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SSC HSLC Exam</title>
<style>
body{font-family:Arial;background:#f4f6f9;margin:0}
.header{background:#1e3a8a;color:#fff;padding:15px;text-align:center}
.card{max-width:1100px;margin:20px auto;background:#fff;padding:20px;border-radius:10px}
.hidden{display:none}
.palette{display:grid;grid-template-columns:repeat(10,1fr);gap:5px}
.palette button{padding:8px}
.question{margin-top:15px;font-size:18px}
.option{display:block;margin:8px 0}
.timer{font-size:24px;color:red;font-weight:bold}
</style>
</head>
<body>
<div class="header">
<h2>SSC HSLC Multilingual Exam</h2>
<div class="timer" id="timer">60:00</div>
</div>

<div class="card" id="login">
<h3>Candidate Login</h3>
<input id="uid" placeholder="User ID"><br><br>
<input id="pwd" type="password" placeholder="Password"><br><br>
<button onclick="login()">Login</button>
</div>

<div class="card hidden" id="exam">
<div class="palette" id="palette"></div>
<div id="questionBox"></div>
<br>
<button onclick="prevQ()">Previous</button>
<button onclick="nextQ()">Next</button>
<button onclick="submitExam()">Submit</button>
</div>

<div class="card hidden" id="result"></div>

<script>
const questions=[
{q:"What is 25% of 200?",options:["25","40","50","75"],answer:2},
{q:"What is the square root of 144?",options:["10","11","12","13"],answer:2},
{q:"18 × 5 = ?",options:["80","85","90","95"],answer:2},
{q:"240 ÷ 12 = ?",options:["18","20","22","24"],answer:1},
{q:"What is 15% of 300?",options:["35","40","45","50"],answer:2},
{q:"LCM of 12 and 18?",options:["24","36","48","54"],answer:1},
{q:"HCF of 24 and 36?",options:["6","8","12","18"],answer:2},
{q:"7² = ?",options:["42","49","56","64"],answer:1},
{q:"9³ = ?",options:["729","81","243","512"],answer:0},
{q:"0.75 as a fraction?",options:["1/2","3/4","2/3","4/5"],answer:1},
{q:"What is 35 + 48?",options:["73","83","93","103"],answer:1},
{q:"What is 125 - 78?",options:["47","57","67","77"],answer:0},
{q:"What is 14 × 6?",options:["74","84","94","104"],answer:1},
{q:"What is 144 ÷ 9?",options:["14","15","16","18"],answer:2},
{q:"50% of 600?",options:["200","250","300","350"],answer:2},
{q:"Perimeter of a square of side 8 cm?",options:["24","32","40","48"],answer:1},
{q:"Area of a rectangle 10 × 5?",options:["25","40","50","60"],answer:2},
{q:"Simple interest on ₹1000 at 10% for 1 year?",options:["50","100","150","200"],answer:1},
{q:"1 kilometre = ?",options:["100 m","500 m","1000 m","1500 m"],answer:2},
{q:"Average of 10, 20, 30?",options:["15","20","25","30"],answer:1},
{q:"What is 2/5 of 100?",options:["20","30","40","50"],answer:2},
{q:"Value of π (approx)?",options:["2.14","3.14","4.13","3.41"],answer:1},
{q:"What is 81 ÷ 9?",options:["7","8","9","10"],answer:2},
{q:"12% of 500?",options:["50","60","70","80"],answer:1},
{q:"If x = 5, then 2x + 3 = ?",options:["10","11","12","13"],answer:3}
];
// Add remaining questions exactly as your dataset if needed.
let current=0,answers={};

function login(){
 if(uid.value==="7896024881" && pwd.value==="Deepshikha@123"){
   login.classList.add('hidden');
   exam.classList.remove('hidden');
   buildPalette(); loadQuestion();
 } else alert("Invalid Login");
}
function buildPalette(){
 let h="";
 for(let i=0;i<questions.length;i++) h+=`<button onclick="gotoQ(${i})">${i+1}</button>`;
 palette.innerHTML=h;
}
function gotoQ(i){current=i;loadQuestion();}
function prevQ(){if(current>0){current--;loadQuestion();}}
function nextQ(){if(current<questions.length-1){current++;loadQuestion();}}
function loadQuestion(){
 let q=questions[current];
 let h=`<div class='question'><b>${current+1}. ${q.q}</b></div>`;
 q.options.forEach((o,i)=>{
 h+=`<label class='option'><input type='radio' name='ans'
 ${answers[current]===i?'checked':''}
 onchange='answers[${current}]=${i}'> ${o}</label>`;
 });
 questionBox.innerHTML=h;
}
let t=3600;
setInterval(()=>{
 let m=Math.floor(t/60),s=t%60;
 timer.innerText=String(m).padStart(2,'0')+":"+String(s).padStart(2,'0');
 if(--t<0) submitExam();
},1000);

function submitExam(){
 let attempted=0,correct=0,wrong=0,score=0;
 questions.forEach((q,i)=>{
  if(answers[i]!==undefined){
   attempted++;
   if(answers[i]===q.answer){correct++;score+=1;}
   else{wrong++;score-=0.25;}
  }
 });
 exam.classList.add('hidden');
 result.classList.remove('hidden');
 result.innerHTML=`<h2>Result</h2>
 Total: ${questions.length}<br>
 Attempted: ${attempted}<br>
 Correct: ${correct}<br>
 Wrong: ${wrong}<br>
 Final Score: ${score}`;
}
</script>
</body>
</html>
