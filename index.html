<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Online Exam Portal</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f6f9;
}

.header{
background:#1e3a8a;
color:white;
padding:15px;
text-align:center;
font-size:24px;
font-weight:bold;
}

.login-page,
.exam-page,
.result-page{
max-width:1200px;
margin:20px auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.exam-page,
.result-page{
display:none;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:6px;
}

button{
padding:10px 20px;
border:none;
border-radius:6px;
cursor:pointer;
background:#2563eb;
color:white;
font-size:15px;
}

button:hover{
background:#1d4ed8;
}

.main{
display:flex;
gap:20px;
}

.left{
flex:3;
}

.right{
flex:1;
}

.question{
font-size:20px;
margin-bottom:20px;
}

.option{
padding:12px;
border:1px solid #ccc;
margin:10px 0;
border-radius:6px;
cursor:pointer;
}

.option.selected{
background:#dbeafe;
border-color:#2563eb;
}

.palette{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:8px;
}

.palette button{
padding:10px;
font-size:14px;
}

.answered{
background:green !important;
}

.current{
background:orange !important;
}

.timer{
font-size:22px;
font-weight:bold;
color:red;
margin-bottom:20px;
}

.nav-buttons{
margin-top:20px;
display:flex;
justify-content:space-between;
}

.result-card{
font-size:20px;
line-height:40px;
}
</style>
</head>
<body>

<div class="header">
SSC / Competitive Exam Portal
</div>

<!-- LOGIN -->

<div class="login-page" id="loginPage">
<h2>Candidate Login</h2>

<input type="text" id="name" placeholder="Enter Candidate Name">

<button onclick="startExam()">
Start Exam
</button>
</div>

<!-- EXAM -->

<div class="exam-page" id="examPage">

<div class="timer" id="timer">
60:00
</div>

<div class="main">

<div class="left">

<div class="question" id="questionText"></div>

<div id="options"></div>

<div class="nav-buttons">
<button onclick="prevQuestion()">Previous</button>
<button onclick="nextQuestion()">Next</button>
</div>

</div>

<div class="right">

<h3>Question Palette</h3>

<div class="palette" id="palette"></div>

<br>

<button onclick="submitExam()">
Submit Exam
</button>

</div>

</div>
</div>

<!-- RESULT -->

<div class="result-page" id="resultPage">

<h2>Exam Result</h2>

<div class="result-card" id="resultData"></div>

</div>

<script>

/* ==========================
PUT ALL 100 QUESTIONS HERE
========================== */

const questions = [

{
q:"What is 25% of 200?",
options:["25","40","50","75"],
answer:2
},

{
q:"Square root of 144?",
options:["10","11","12","13"],
answer:2
},

{
q:"18 × 5 = ?",
options:["80","85","90","95"],
answer:2
}

];

/* ========================== */

let current=0;
let answers=new Array(questions.length).fill(null);

function startExam(){

let name=document.getElementById("name").value;

if(name===""){
alert("Enter Name");
return;
}

document.getElementById("loginPage").style.display="none";
document.getElementById("examPage").style.display="block";

renderQuestion();
createPalette();
startTimer();
}

function renderQuestion(){

let q=questions[current];

document.getElementById("questionText").innerHTML=
(current+1)+". "+q.q;

let html="";

q.options.forEach((opt,index)=>{

html+=`
<div class="option ${answers[current]===index?'selected':''}"
onclick="selectOption(${index})">
${opt}
</div>
`;

});

document.getElementById("options").innerHTML=html;

updatePalette();
}

function selectOption(index){

answers[current]=index;

renderQuestion();
}

function nextQuestion(){

if(current<questions.length-1){
current++;
renderQuestion();
}
}

function prevQuestion(){

if(current>0){
current--;
renderQuestion();
}
}

function createPalette(){

let html="";

for(let i=0;i<questions.length;i++){

html+=`
<button id="p${i}" onclick="gotoQuestion(${i})">
${i+1}
</button>
`;

}

document.getElementById("palette").innerHTML=html;

updatePalette();
}

function gotoQuestion(i){

current=i;
renderQuestion();
}

function updatePalette(){

for(let i=0;i<questions.length;i++){

let btn=document.getElementById("p"+i);

if(!btn) continue;

btn.className="";

if(answers[i]!=null){
btn.classList.add("answered");
}

if(i===current){
btn.classList.add("current");
}
}
}

/* TIMER */

let time=60*60;

function startTimer(){

setInterval(()=>{

time--;

let m=Math.floor(time/60);
let s=time%60;

document.getElementById("timer").innerHTML=
String(m).padStart(2,'0')+
":"+
String(s).padStart(2,'0');

if(time<=0){
submitExam();
}

},1000);

}

/* RESULT */

function submitExam(){

let correct=0;
let wrong=0;
let unanswered=0;

questions.forEach((q,index)=>{

if(answers[index]==null){
unanswered++;
}
else if(answers[index]===q.answer){
correct++;
}
else{
wrong++;
}

});

/* NEGATIVE MARKING */

let score=(correct*1)-(wrong*0.25);

let percentage=
((score/questions.length)*100).toFixed(2);

document.getElementById("examPage").style.display="none";
document.getElementById("resultPage").style.display="block";

document.getElementById("resultData").innerHTML=`

<b>Total Questions:</b> ${questions.length}<br>

<b>Correct:</b> ${correct}<br>

<b>Wrong:</b> ${wrong}<br>

<b>Unanswered:</b> ${unanswered}<br>

<b>Negative Marking:</b> 0.25 per wrong answer<br>

<b>Final Score:</b> ${score.toFixed(2)}<br>

<b>Percentage:</b> ${percentage}%<br>

<b>Status:</b>
${percentage>=40
?'<span style="color:green">PASS</span>'
:'<span style="color:red">FAIL</span>'}

`;

}

</script>

</body>
</html>
